name: CI/CD/CT Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Continuous Training: Run every Sunday at 2 AM
    - cron: '0 2 * * 0'

jobs:
  continuous-integration:
    name: Continuous Integration
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8
    
    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run unit tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml

  continuous-training:
    name: Continuous Training
    runs-on: ubuntu-latest
    needs: continuous-integration
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, '[retrain]')
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Setup DVC
      run: |
        pip install dvc
        dvc pull
    
    - name: Run retraining pipeline
      run: |
        python scripts/retrain_model.py
    
    - name: Evaluate model performance
      run: |
        python -m src.models.evaluate_model
    
    - name: Upload model artifacts
      uses: actions/upload-artifact@v3
      with:
        name: trained-model
        path: models/

  continuous-deployment:
    name: Continuous Deployment
    runs-on: ubuntu-latest
    needs: continuous-integration
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        docker build -t churn-prediction-api:${{ github.sha }} .
    
    - name: Run container tests
      run: |
        docker run -d -p 8000:8000 --name test-api churn-prediction-api:${{ github.sha }}
        sleep 10
        curl -f http://localhost:8000/ || exit 1
        docker stop test-api
    
    - name: Push to registry (placeholder)
      run: |
        echo "Would push to container registry here"
        # docker push your-registry/churn-prediction-api:${{ github.sha }}
